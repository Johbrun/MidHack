<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="silver">
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.3" intercept="0.1"/>
        <feFuncG type="linear" slope="1.3" intercept="0.1"/>
        <feFuncB type="linear" slope="1.3" intercept="0.1"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="200" height="200" rx="24" fill="#1a1a2e"/>
  <text x="100" y="115" text-anchor="middle" font-size="80" dominant-baseline="central" filter="url(#silver)">🍌</text>
  <text x="100" y="180" text-anchor="middle" fill="#c0c0c0" font-family="sans-serif" font-size="14" font-weight="bold">Silver</text>
</svg>
