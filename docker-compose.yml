services:
  # Central live dashboard (to project on screen)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "5000:5000"
    restart: unless-stopped

  # ──────────────────────── Team 1 ────────────────────────
  site-team1:
    build:
      context: .
      dockerfile: Dockerfile.site
    environment:
      - TEAM_NAME=Team 1
      - DASHBOARD_URL=http://dashboard:5000
    ports:
      - "3001:3000"
    depends_on:
      - dashboard
    restart: unless-stopped

  exploit-team1:
    build:
      context: .
      dockerfile: Dockerfile.exploit
    environment:
      - TEAM_PASSWORD=team1-banana
    ports:
      - "4001:4000"
    restart: unless-stopped

  # ──────────────────────── Team 2 ────────────────────────
