      - "3002:3000"
    depends_on:
      - dashboard
    restart: unless-stopped

  exploit-team2:
    build:
      context: .
      dockerfile: Dockerfile.exploit
      args: *build-args
    environment:
      - TEAM_NAME=${TEAM2_NAME:-Bravo}
      - TEAM_PASSWORD=${TEAM2_PASSWORD:-team2}
      - SITE_URL=http://site-team2:3000
      - DASHBOARD_URL=http://dashboard:5000
    ports:
      - "4002:4000"
    restart: unless-stopped

  # ──────────────────────── Team 3 ────────────────────────
  site-team3:
    build:
      context: .
      dockerfile: Dockerfile.site
      args: *build-args
    environment:
      - TEAM_NAME=${TEAM3_NAME:-Charlie}
      - DASHBOARD_URL=http://dashboard:5000
    ports:
      - "3003:3000"
    depends_on:
      - dashboard
    restart: unless-stopped

  exploit-team3:
    build:
      context: .
      dockerfile: Dockerfile.exploit
      args: *build-args
    environment:
      - TEAM_NAME=${TEAM3_NAME:-Charlie}
      - TEAM_PASSWORD=${TEAM3_PASSWORD:-team3}
      - SITE_URL=http://site-team3:3000
