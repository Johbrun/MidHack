# Configuration centralisée dans .env (copiez .env.example → .env)
x-build-args: &build-args
  VITE_NANTES_HACK: "${VITE_NANTES_HACK:-0}"
  VITE_PROGRESSIVE_UNLOCK: "${VITE_PROGRESSIVE_UNLOCK:-false}"
  VITE_UNLOCK_THRESHOLD: "${VITE_UNLOCK_THRESHOLD:-2}"

services:
  # Central live dashboard (to project on screen)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args: *build-args
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - HINT_PENALTY=${HINT_PENALTY:-3}
      - EVENT_TITLE=${EVENT_TITLE:-BananaShop CTF}
    ports:
      - "5000:5000"
    restart: unless-stopped

  # ──────────────────────── Team 1 ────────────────────────
  site-team1:
    build:
      context: .
      dockerfile: Dockerfile.site
      args: *build-args
    environment:
      - TEAM_NAME=${TEAM1_NAME:-Alpha}
      - DASHBOARD_URL=http://dashboard:5000
    ports:
      - "3001:3000"
    depends_on:
      - dashboard
    restart: unless-stopped

  exploit-team1:
    build:
      context: .
      dockerfile: Dockerfile.exploit
      args: *build-args
    environment:
      - TEAM_NAME=${TEAM1_NAME:-Alpha}
      - TEAM_PASSWORD=${TEAM1_PASSWORD:-team1}
      - SITE_URL=http://site-team1:3000
      - DASHBOARD_URL=http://dashboard:5000
    ports:
      - "4001:4000"
    restart: unless-stopped

  # ──────────────────────── Team 2 ────────────────────────
  site-team2:
    build:
      context: .
      dockerfile: Dockerfile.site
      args: *build-args
    environment:
      - TEAM_NAME=${TEAM2_NAME:-Bravo}
      - DASHBOARD_URL=http://dashboard:5000
