<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BananaShop CTF - Classement en direct</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo:wght@400;600;700;800;900&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0E0B11;
      color: #fff;
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Background effects */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 700px;
      height: 700px;
      border: 1px solid rgba(250, 187, 92, 0.04);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      left: -100px;
      width: 500px;
      height: 500px;
      border: 1px solid rgba(5, 147, 167, 0.04);
      pointer-events: none;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 40px 48px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }
    .title {
      font-family: 'Exo', sans-serif;
      font-weight: 900;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
    }
    .gradient-text {
      background: linear-gradient(135deg, #FABB5C, #0593A7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.3);
      font-size: 0.875rem;
      margin-top: 4px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }
    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10B981;
      animation: pulse 2s infinite;
    }
    .live-dot.offline { background: #ef4444; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* Table */
    .table-wrapper {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: center;
      padding: 16px 8px;
      font-family: 'Exo', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }
    th:first-child, th:nth-child(2) { text-align: left; }
    td {
      padding: 16px 8px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.85rem;
    }
    td:first-child, td:nth-child(2) { text-align: left; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(255,255,255,0.02); }

    .rank {
      font-family: 'Exo', sans-serif;
      font-weight: 800;
      color: rgba(255,255,255,0.15);
      font-size: 1.2rem;
      width: 50px;
    }
    .rank-1 { color: #FABB5C; }

    .team-name {
      font-family: 'Exo', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .team-1 { color: #FABB5C; }

    .score {
      font-family: 'Exo', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      color: #FABB5C;
    }

    .flag-cell {
      position: relative;
    }
    .flag-icon {
      font-size: 1.2rem;
      opacity: 0.15;
    }
    .flag-icon.captured {
      opacity: 1;
      color: #10B981;
      animation: flagPop 0.5s ease;
    }

    @keyframes flagPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .flag-time {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.85);
      font-family: 'Source Code Pro', monospace;
      margin-top: 2px;
    }

    .empty {
      text-align: center;
      padding: 80px;
      color: rgba(255,255,255,0.15);
    }
    .empty-emoji { font-size: 4rem; margin-bottom: 16px; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10B981;
      padding: 16px 24px;
      border-radius: 12px;
      font-family: 'Exo', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 100;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Timer */
    .timer {
      font-family: 'Exo', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      color: #FABB5C;
      letter-spacing: 0.05em;
    }
    .timer.warning { color: #f87171; animation: pulse 1s infinite; }
    .timer-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Toast stack */
    .toast-container {
      position: fixed;
      bottom: 32px;
      right: 32px;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      z-index: 100;
    }
    .toast-item {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10B981;
      padding: 16px 24px;
      border-radius: 12px;
      font-family: 'Exo', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.4s ease;
      white-space: nowrap;
    }
    .toast-item.show {
      transform: translateX(0);
      opacity: 1;
    }
    .toast-item.hint {
      background: rgba(250, 187, 92, 0.15);
      border-color: rgba(250, 187, 92, 0.3);
      color: #FABB5C;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="title"><span class="gradient-text">BananaShop CTF</span></h1>
        <p class="subtitle">Classement en direct</p>
      </div>
      <div id="timerBlock" style="text-align:center;display:none;">
        <div class="timer-label">Temps restant</div>
        <div class="timer" id="timerDisplay">--:--</div>
      </div>
      <div class="live-badge">
        <div class="live-dot" id="liveDot"></div>
        <span id="statusText">Connexion...</span>
      </div>
    </div>

    <div class="table-wrapper">
      <div id="content">
        <div class="empty">
          <div class="empty-emoji">🍌</div>
          <p>En attente des équipes...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const FLAGS = [
      { name: 'Sensitive Data Exposure', points: 10, difficulty: 'Facile' },
      { name: 'IDOR', points: 10, difficulty: 'Facile' },
      { name: 'Path Traversal', points: 10, difficulty: 'Facile' },
      { name: 'Reflected XSS', points: 15, difficulty: 'Moyen' },
      { name: 'SQL Injection (Login Bypass)', points: 15, difficulty: 'Moyen' },
      { name: 'Business Logic', points: 15, difficulty: 'Moyen' },
      { name: 'Zero Rating', points: 10, difficulty: 'Facile' },
      { name: 'Mass Assignment', points: 15, difficulty: 'Moyen' },
      { name: 'CSRF', points: 15, difficulty: 'Moyen' },
      { name: 'JWT Forging', points: 15, difficulty: 'Moyen' },
      { name: 'SQL Injection (UNION)', points: 20, difficulty: 'Difficile' },
      { name: 'Stored XSS', points: 20, difficulty: 'Difficile' },
      { name: 'SSRF', points: 20, difficulty: 'Difficile' },
      { name: 'Cookie Theft (XSS)', points: 20, difficulty: 'Difficile' },
    ];
    const MAX_SCORE = FLAGS.reduce((s, f) => s + f.points, 0);
    const HINT_PENALTY = 3;

    const content = document.getElementById('content');
    const liveDot = document.getElementById('liveDot');
    const statusText = document.getElementById('statusText');
    const toastContainer = document.getElementById('toastContainer');
    const timerBlock = document.getElementById('timerBlock');
    const timerDisplay = document.getElementById('timerDisplay');

    let teams = [];
    let timerEndTime = null;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => {
        liveDot.classList.remove('offline');
        statusText.textContent = 'En direct';
      };

      ws.onclose = () => {
        liveDot.classList.add('offline');
        statusText.textContent = 'Reconnexion...';
        setTimeout(connect, 3000);
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === 'scoreboard') {
          teams = data.teams;
          render();
        }

        if (data.type === 'capture') {
          showToast(`🏴 ${data.teamName} a capturé ${data.flagName} ! (+${data.points}pts)`);
        }

        if (data.type === 'hint') {
          showToast(`💡 ${data.teamName} a utilisé un indice pour ${data.challengeName} (-${HINT_PENALTY}pts)`, 'hint');
        }

        if (data.type === 'timer') {
          if (data.running && data.endTime) {
            timerEndTime = data.endTime;
            timerBlock.style.display = 'block';
          } else {
            timerEndTime = null;
            timerBlock.style.display = 'none';
          }
        }
      };
    }

    function render() {
      if (teams.length === 0) {
        content.innerHTML = '<div class="empty"><div class="empty-emoji">🍌</div><p>En attente des équipes...</p></div>';
        return;
      }

      let html = '<table><thead><tr>';
      html += '<th>#</th><th>Équipe</th><th>Score</th>';
      FLAGS.forEach(f => { html += `<th>${esc(f.name)}<br><span style="font-size:0.6rem;color:rgba(255,255,255,0.5);">${f.points}pts · ${f.difficulty}</span></th>`; });
      html += '</tr></thead><tbody>';

      teams.forEach((team, i) => {
        const rank = i + 1;
        const hints = team.hints || [];
        const score = team.score !== undefined ? team.score : (team.captures.reduce((s, c) => s + (c.points || 0), 0) - hints.length * HINT_PENALTY);
        html += `<tr>`;
        html += `<td class="rank ${rank === 1 ? 'rank-1' : ''}">${rank}</td>`;
        html += `<td class="team-name ${rank === 1 ? 'team-1' : ''}">${esc(team.name)}`;
        if (hints.length > 0) {
          html += `<span style="margin-left:8px;font-size:0.65rem;color:rgba(250,187,92,0.5);" title="${hints.length} indice(s) utilisé(s) (-${hints.length * HINT_PENALTY}pts)">💡${hints.length}</span>`;
        }
        html += `</td>`;
        html += `<td class="score">${score}<span style="font-size:0.7rem;color:rgba(255,255,255,0.2)"> / ${MAX_SCORE}</span></td>`;

        FLAGS.forEach(f => {
          const cap = team.captures.find(c => c.flagName === f.name);
          const hintUsed = hints.some(h => h.challengeName === f.name);
          html += `<td class="flag-cell">`;
          if (cap) {
            const time = new Date(cap.capturedAt).toLocaleTimeString();
            if (hintUsed) {
              html += `<div class="flag-icon captured" style="color:#FABB5C;">✓</div><div class="flag-time">${time}</div>`;
            } else {
              html += `<div class="flag-icon captured">✓</div><div class="flag-time">${time}</div>`;
            }
          } else if (hintUsed) {
            html += `<div class="flag-icon" style="opacity:0.6;color:#FABB5C;">💡</div>`;
          } else {
            html += `<div class="flag-icon">🔒</div>`;
          }
          html += `</td>`;
        });

        html += `</tr>`;
      });

      html += '</tbody></table>';
      content.innerHTML = html;
    }

    function showToast(msg, type) {
      const item = document.createElement('div');
      item.className = 'toast-item' + (type === 'hint' ? ' hint' : '');
      item.textContent = msg;
      toastContainer.appendChild(item);
      requestAnimationFrame(() => requestAnimationFrame(() => item.classList.add('show')));
      setTimeout(() => {
        item.classList.remove('show');
        setTimeout(() => item.remove(), 400);
      }, 5000);
      // Keep max 5 toasts
      while (toastContainer.children.length > 5) toastContainer.removeChild(toastContainer.firstChild);
    }

    // Timer update loop
    function updateTimer() {
      if (!timerEndTime) return;
      const remaining = Math.max(0, timerEndTime - Date.now());
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      timerDisplay.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
      timerDisplay.className = remaining < 300000 ? 'timer warning' : 'timer';
      if (remaining <= 0) {
        timerDisplay.textContent = "00:00";
        timerDisplay.className = 'timer warning';
        timerEndTime = null;
      }
    }
    setInterval(updateTimer, 1000);

    // Load timer state on page load
    fetch('/api/timer').then(r => r.json()).then(data => {
      if (data.running && data.endTime) {
        timerEndTime = data.endTime;
        timerBlock.style.display = 'block';
        updateTimer();
      }
    }).catch(() => {});

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    connect();
  </script>
</body>
</html>
