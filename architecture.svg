<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .box { stroke: #334155; stroke-width: 1.5; rx: 10; ry: 10; }
      .title { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .sub { font-size: 11px; fill: #334155; }
      .port { font-size: 11px; fill: #64748b; font-style: italic; }
      .legend { font-size: 12px; fill: #1e293b; }
      .edge { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .edge-dash { stroke-dasharray: 5 4; }
      .edge-label { font-size: 10px; fill: #475569; }
      .group-label { font-size: 13px; font-weight: 600; fill: #475569; }
    </style>
  </defs>

  <!-- Title -->
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">midhack — Architecture</text>
  <text x="560" y="54" text-anchor="middle" font-size="12" fill="#64748b">CTF pédagogique : app vulnérable + dashboard scores + serveur d'exploit</text>

  <!-- ============ ROW 1 (y 100-260) ============ -->

  <!-- Attacker -->
  <g>
    <rect class="box" x="40" y="120" width="180" height="120" fill="#fef3c7"/>
    <text class="title" x="130" y="152" text-anchor="middle">👤 Attaquant</text>
    <text class="sub" x="130" y="176" text-anchor="middle">Navigateur du joueur</text>
    <text class="sub" x="130" y="194" text-anchor="middle">(équipe en CTF)</text>
    <text class="sub" x="130" y="218" text-anchor="middle">+ payloads XSS</text>
  </g>

  <!-- BananaShop client -->
  <g>
    <rect class="box" x="290" y="120" width="220" height="120" fill="#dbeafe"/>
    <text class="title" x="400" y="150" text-anchor="middle">BananaShop — client</text>
    <text class="sub" x="400" y="172" text-anchor="middle">Vite + React + Tailwind</text>
    <text class="sub" x="400" y="190" text-anchor="middle">client/</text>
    <text class="port" x="400" y="214" text-anchor="middle">dev :5173</text>
    <text class="sub" x="400" y="232" text-anchor="middle">UI vulnérable (XSS, IDOR…)</text>
  </g>

  <!-- Exploit server -->
  <g>
    <rect class="box" x="580" y="120" width="220" height="120" fill="#e9d5ff"/>
    <text class="title" x="690" y="150" text-anchor="middle">Exploit server</text>
    <text class="sub" x="690" y="172" text-anchor="middle">Express + SSE + React</text>
    <text class="sub" x="690" y="190" text-anchor="middle">exploit-server/</text>
    <text class="port" x="690" y="214" text-anchor="middle">:4000  •  /log /events /api/*</text>
    <text class="sub" x="690" y="232" text-anchor="middle">webhook + détection JWT volé</text>
  </g>

  <!-- Dashboard -->
  <g>
    <rect class="box" x="870" y="120" width="220" height="120" fill="#dcfce7"/>
    <text class="title" x="980" y="150" text-anchor="middle">Dashboard scores</text>
    <text class="sub" x="980" y="172" text-anchor="middle">Express + WebSocket + React</text>
    <text class="sub" x="980" y="190" text-anchor="middle">dashboard/</text>
    <text class="port" x="980" y="214" text-anchor="middle">:5000  •  /api/* /ws</text>
    <text class="sub" x="980" y="232" text-anchor="middle">scoreboard.json + timer</text>
  </g>

  <!-- ============ ROW 2 (y 350-470) ============ -->

  <!-- BananaShop server -->
  <g>
    <rect class="box" x="290" y="370" width="220" height="160" fill="#fecaca"/>
    <text class="title" x="400" y="400" text-anchor="middle">BananaShop — server</text>
    <text class="sub" x="400" y="420" text-anchor="middle">Express + SQLite</text>
    <text class="sub" x="400" y="438" text-anchor="middle">server/src/</text>
    <text class="port" x="400" y="460" text-anchor="middle">:3000  •  /api/*</text>
    <text class="sub" x="400" y="482" text-anchor="middle">routes: auth, users, products,</text>
    <text class="sub" x="400" y="498" text-anchor="middle">reviews, credits, admin, flags,</text>
    <text class="sub" x="400" y="514" text-anchor="middle">xss-flag, config</text>
  </g>

  <!-- ============ ROW 3 (y 600-720) ============ -->

  <!-- Shared -->
  <g>
    <rect class="box" x="40" y="600" width="220" height="120" fill="#f1f5f9"/>
    <text class="title" x="150" y="628" text-anchor="middle">shared/</text>
    <text class="sub" x="150" y="652" text-anchor="middle">flags.json — catalogue</text>
    <text class="sub" x="150" y="670" text-anchor="middle">register-team.js — helper</text>
    <text class="sub" x="150" y="694" text-anchor="middle">requis par server + exploit</text>
  </g>

  <!-- Docker -->
  <g>
    <rect class="box" x="870" y="600" width="220" height="120" fill="#f1f5f9"/>
    <text class="title" x="980" y="628" text-anchor="middle">docker-compose</text>
    <text class="sub" x="980" y="652" text-anchor="middle">Dockerfile.site</text>
    <text class="sub" x="980" y="670" text-anchor="middle">Dockerfile.dashboard</text>
    <text class="sub" x="980" y="688" text-anchor="middle">Dockerfile.exploit</text>
  </g>

  <!-- ============ ARROWS ============ -->

  <!-- attacker -> client (row 1, horizontal) -->
  <path class="edge" d="M220,165 L288,165"/>
  <text class="edge-label" x="254" y="158" text-anchor="middle">HTTPS</text>

  <!-- client <-> server (vertical between rows) -->
  <path class="edge" d="M380,240 L380,368"/>
  <text class="edge-label" x="346" y="306" text-anchor="middle">/api</text>
  <path class="edge" d="M420,368 L420,240"/>
  <text class="edge-label" x="446" y="306" text-anchor="middle">JSON</text>

  <!-- attacker -> exploit (route under client via channel y=300, no overlap) -->
  <path class="edge edge-dash" d="M130,240 L130,300 L690,300 L690,242"/>
  <text class="edge-label" x="410" y="294" text-anchor="middle">login + soumission flags + payload XSS exfiltre cookie → /log</text>

  <!-- exploit -> dashboard (row 1, horizontal) -->
  <path class="edge" d="M800,170 L868,170"/>
  <text class="edge-label" x="834" y="162" text-anchor="middle">capture / hint / register</text>

  <!-- server -> dashboard (route via right channel x=830, then up to dashboard bottom) -->
  <path class="edge" d="M510,420 L830,420 L830,242"/>
  <text class="edge-label" x="670" y="412" text-anchor="middle">POST /api/capture  •  POST /api/teams/register</text>

  <!-- shared -> server (vertical, col 2) -->
  <path class="edge edge-dash" d="M260,640 L370,640 L370,532"/>
  <text class="edge-label" x="282" y="632">require</text>

  <!-- shared -> exploit (route along bottom y=720 then up the right channel x=580) -->
  <path class="edge edge-dash" d="M260,680 L560,680 L560,242"/>
  <text class="edge-label" x="408" y="672" text-anchor="middle">require</text>

  <!-- ============ Legend ============ -->
  <g transform="translate(290,600)">
    <rect class="box" x="0" y="0" width="560" height="120" fill="#ffffff"/>
    <text class="group-label" x="16" y="24">Légende</text>
    <line x1="20" y1="48" x2="60" y2="48" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text class="legend" x="70" y="52">trafic HTTP / WebSocket en fonctionnement normal</text>
    <line x1="20" y1="72" x2="60" y2="72" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
    <text class="legend" x="70" y="76">événement ponctuel (boot, exploit) / dépendance de code</text>
    <rect x="20" y="90" width="14" height="14" fill="#fecaca" stroke="#334155"/>
    <text class="legend" x="42" y="102">code intentionnellement vulnérable</text>
    <rect x="280" y="90" width="14" height="14" fill="#dcfce7" stroke="#334155"/>
    <text class="legend" x="302" y="102">infrastructure CTF (scores)</text>
  </g>
</svg>
