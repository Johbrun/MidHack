  <text x="220" y="264" text-anchor="middle" font-size="11" fill="#3b82f6">React 18 + Vite + Tailwind</text>
  <text x="220" y="282" text-anchor="middle" font-size="10" fill="#64748b">client/ &mdash; SPA vulnérable</text>
  <text x="220" y="300" text-anchor="middle" font-size="10" fill="#64748b">XSS (dangerouslySetInnerHTML), CSRF forms</text>
  <text x="220" y="318" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">:300N</text>

  <!-- Server -->
